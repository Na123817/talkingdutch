<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Talking Dutch favicon">
  <defs>
    <radialGradient id="dotGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#ffd3ad"/>
      <stop offset="38%" stop-color="#ff9b47"/>
      <stop offset="68%" stop-color="#e87722"/>
      <stop offset="100%" stop-color="#8f3f07"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="58%">
      <stop offset="0%" stop-color="#ff9b47" stop-opacity="0.42"/>
      <stop offset="100%" stop-color="#ff9b47" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="14" fill="#121212"/>
  <rect x="4" y="4" width="56" height="56" rx="14" fill="none" stroke="#e87722" stroke-width="2.5"/>

  <circle cx="32" cy="32" r="18" fill="url(#halo)"/>
  <circle cx="32" cy="32" r="10.5" fill="url(#dotGlow)" filter="url(#softGlow)"/>
</svg>
